version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev

    container_name: library-ai-lab-dev

    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

    env_file:
      - .env.local

    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      WATCHPACK_POLLING: "true"

    command: npm run dev -- --webpack

    restart: unless-stopped