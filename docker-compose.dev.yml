version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev

    container_name: library-ai-lab-dev

    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - /app/node_modules

    env_file:
      - .env.local

    environment:
      NODE_ENV: development

    command: npm run dev

    restart: unless-stopped