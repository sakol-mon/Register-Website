version: '3.8'

services:
  app:
    build: .
    container_name: library-ai-lab-dev
    ports:
      - "80:3000"

    env_file:
      - .env.local

    environment:
      - NODE_ENV=production
      - PORT=3000

    restart: always

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M